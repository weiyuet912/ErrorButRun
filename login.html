<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lang Sushi - Admin Login</title>
    <style>
        body { background-color: #fff9f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .card { background: white; padding: 50px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 380px; border: 6px solid #ff7e5f; text-align: center; }
        h2 { color: #d35400; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 20px; border: 2px solid #fce4ec; outline: none; box-sizing: border-box; font-size: 16px; }
        .login-btn { width: 100%; padding: 16px; background: #ff7e5f; color: white; border: none; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 0 #e66a4e; }
        .login-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #e66a4e; }
        #error-msg { color: #ff5252; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Admin Login</h2>
        <div id="error-msg"></div>
        <input type="text" id="user" placeholder="Admin Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="login-btn" onclick="handleLogin()">Login</button>
    </div>

    <script>
        async function handleLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const errorDiv = document.getElementById('error-msg');

            const res = await fetch('/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            
            if(data.status === 'success') {
                window.location.href = data.next_page;
            } else {
                errorDiv.innerText = data.message;
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
